<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday, Prang!</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5f0e8;
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.card {
  position: relative;
  width: min(520px, 100%);
  background: #c8c832;
  border-radius: 8px;
  padding: 48px 32px 52px;
  box-shadow: 6px 6px 0 #a0a020, 12px 12px 0 rgba(0,0,0,0.1);
}
.burst {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -54%);
  width: 280px; height: 280px;
  z-index: 0; pointer-events: none;
}
.banner {
  position: relative; z-index: 2;
  display: flex; justify-content: center; align-items: flex-end;
  gap: 4px; margin-bottom: 20px;
}
.flag { display: flex; flex-direction: column; align-items: center; }
.flag-string { width: 1px; height: 20px; background: #888; }
.flag-body {
  width: 34px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Boogaloo', cursive; font-size: 1.15rem; font-weight: bold; color: #333;
  clip-path: polygon(0 0, 100% 0, 100% 75%, 50% 100%, 0 75%);
}
.flag:nth-child(odd)  .flag-body { background: #f4c2c2; }
.flag:nth-child(even) .flag-body { background: #f5e642; }
.star { position: absolute; z-index: 1; }
.photo-wrap {
  position: relative; z-index: 3;
  display: flex; justify-content: center;
  margin: 24px 0 12px;
}
.photo-cutout {
  width: 210px; height: 210px;
  border-radius: 50%;
  object-fit: cover; object-position: center top;
  border: 6px solid white;
  filter: drop-shadow(3px 4px 8px rgba(0,0,0,0.35));
}
.hat {
  position: absolute; top: -72px;
  left: 50%; transform: translateX(-38%) rotate(-12deg);
  z-index: 4;
}
.message-block {
  position: relative; z-index: 3;
  background: white; border-radius: 6px;
  padding: 20px 22px; margin: 0 0 0;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.12);
  border: 2px solid rgba(0,0,0,0.06);
}
.message-block p { font-size: 1rem; line-height: 1.8; color: #333; }
.message-block p strong { color: #2a52be; }
.bottom-label {
  position: relative; z-index: 3;
  text-align: center; margin-top: 20px;
  font-family: 'Boogaloo', cursive;
  font-size: 1.6rem; color: white;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  letter-spacing: 3px;
}
</style>
</head>
